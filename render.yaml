databases:
  - name: weekly-sync-db
    plan: free
    databaseName: weekly_sync
    user: weekly_sync

services:
  - type: web
    name: weekly-sync-events
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL
        fromDatabase:
          name: weekly-sync-db
          property: connectionString
